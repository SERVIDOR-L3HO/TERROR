<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historias de Terror — VOCES DEL TERROR</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo">💀</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div class="particles-container" id="particles"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo">💀 <span>VOCES</span> DEL TERROR</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Inicio</a></li>
      <li><a href="/historias">Historias</a></li>
      <li><a href="/subir" class="btn-nav">+ Confesar</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div class="page-header">
    <span class="section-eyebrow">— El Archivo del Horror —</span>
    <h1>Todas las Historias</h1>
    <p>Cada confesión es real. Cada sombra tiene nombre.</p>
  </div>

  <div class="section">
    <!-- FILTER BAR -->
    <div class="filter-bar fade-in">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar en las sombras...">
      <button class="filter-btn active" data-cat="all">Todas</button>
      <button class="filter-btn" data-cat="aparicion">👻 Apariciones</button>
      <button class="filter-btn" data-cat="demonio">😈 Demonios</button>
      <button class="filter-btn" data-cat="extraterrestre">👽 Extraterrestres</button>
      <button class="filter-btn" data-cat="maldicion">🪄 Maldiciones</button>
      <button class="filter-btn" data-cat="paranormal">🔮 Paranormal</button>
      <button class="filter-btn" data-cat="asesino">🔪 Asesinos</button>
      <button class="filter-btn" data-cat="suenos">😴 Sueños</button>
      <button class="filter-btn" data-cat="otro">❓ Otro</button>
    </div>

    <!-- SORT BAR -->
    <div style="display:flex;gap:1rem;align-items:center;margin-bottom:2rem;flex-wrap:wrap;">
      <span style="font-family:'Special Elite',cursive;font-size:0.75rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;">Ordenar:</span>
      <button class="filter-btn active" data-sort="reciente">Más Recientes</button>
      <button class="filter-btn" data-sort="antiguo">Más Antiguos</button>
      <div id="resultsCount" style="margin-left:auto;font-family:'Special Elite',cursive;font-size:0.75rem;color:var(--text-muted);letter-spacing:2px;"></div>
    </div>

    <!-- STORIES -->
    <div class="stories-grid" id="storiesGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <span class="empty-state-icon">⏳</span>
        <h3>Invocando historias...</h3>
      </div>
    </div>

    <!-- LOAD MORE -->
    <div style="text-align:center;margin-top:3rem;">
      <button id="loadMoreBtn" class="btn-secondary" style="display:none;">Cargar más historias...</button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">💀</div>
    <p class="footer-tagline">Voces del Terror</p>
    <div class="footer-links">
      <a href="/">Inicio</a>
      <a href="/subir">Subir Historia</a>
    </div>
    <div class="footer-bottom">
      <p>⚠ Contenido perturbador para adultos.</p>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKCSSMZE3ybpyP1MSegm4nu1GUGQt9oNc",
      authDomain: "terror-6f51e.firebaseapp.com",
      projectId: "terror-6f51e",
      storageBucket: "terror-6f51e.firebasestorage.app",
      messagingSenderId: "127086938530",
      appId: "1:127086938530:web:bcd051bcf8766e9b214afb",
      measurementId: "G-K3J8MKZQ94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.__db = db;

    let allHistorias = [];
    let currentCat = 'all';
    let currentSort = 'reciente';
    let searchTerm = '';

    // Read URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('cat')) currentCat = urlParams.get('cat');

    async function loadAll() {
      try {
        const q = query(collection(db, 'historias'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allHistorias = [];
        snap.forEach(doc => allHistorias.push({ id: doc.id, ...doc.data() }));
        applyFilters();
      } catch(e) {
        console.error(e);
        document.getElementById('storiesGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <span class="empty-state-icon">⚠️</span>
          <h3>Error al cargar</h3>
          <p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.5rem;">Configura las reglas de Firestore en Firebase Console (modo lectura pública).</p>
        </div>`;
      }
    }

    function applyFilters() {
      let filtered = [...allHistorias];
      if (currentCat !== 'all') filtered = filtered.filter(h => (h.categoria||'otro') === currentCat);
      if (searchTerm) {
        const s = searchTerm.toLowerCase();
        filtered = filtered.filter(h =>
          (h.titulo||'').toLowerCase().includes(s) ||
          (h.historia||'').toLowerCase().includes(s) ||
          (h.autor||'').toLowerCase().includes(s)
        );
      }
      if (currentSort === 'antiguo') filtered = filtered.reverse();
      renderStories(filtered);
      document.getElementById('resultsCount').textContent = `${filtered.length} confesiones`;
    }

    function renderStories(list) {
      const grid = document.getElementById('storiesGrid');
      if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <span class="empty-state-icon">👻</span>
          <h3>Silencio...</h3>
          <p style="color:var(--text-muted);">No hay historias que coincidan con tu búsqueda.</p>
        </div>`;
        return;
      }
      grid.innerHTML = list.map(h => {
        const imgHtml = h.fotos && h.fotos.length
          ? `<img src="${h.fotos[0]}" alt="${h.titulo}" class="card-image" loading="lazy">`
          : `<div class="card-no-image">💀</div>`;
        const dateStr = h.createdAt ? new Date(h.createdAt.seconds * 1000).toLocaleDateString('es-ES', {day:'numeric',month:'short',year:'numeric'}) : '';
        return `
          <a href="/historia/${h.id}" class="story-card fade-in">
            ${imgHtml}
            <div class="card-content">
              <div class="card-category">${h.categoria || 'Paranormal'}</div>
              <h3 class="card-title">${h.titulo}</h3>
              <p class="card-excerpt">${(h.historia || '').substring(0, 150)}...</p>
              <div class="card-meta">
                <span>Por ${h.autor || 'Anónimo'}</span>
                <span>${dateStr}</span>
              </div>
              ${h.fotos && h.fotos.length ? `<div style="font-family:'Special Elite',cursive;font-size:0.7rem;color:var(--text-muted);margin-top:8px;">📸 ${h.fotos.length} evidencia(s)</div>` : ''}
              <div class="mini-player" onclick="event.preventDefault(); playCardAudio('${h.id}', \`${h.titulo}\`, \`${(h.historia||'').substring(0,300).replace(/`/g,'\'')}\`)">
                <button class="mini-play" id="miniplay-${h.id}">▶</button>
                <div class="mini-wave" id="miniwave-${h.id}">
                  <span style="height:8px"></span><span style="height:14px"></span><span style="height:10px"></span><span style="height:16px"></span><span style="height:8px"></span>
                </div>
                <span style="font-family:'Special Elite',cursive;font-size:0.65rem;color:#9b59b6;letter-spacing:1px;">ESCUCHAR</span>
              </div>
            </div>
          </a>`;
      }).join('');
      // Trigger fade-in
      setTimeout(() => document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible')), 50);
    }

    // Event listeners
    document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
      if (btn.dataset.cat === currentCat) { btn.classList.add('active'); }
      else if (currentCat !== 'all') { btn.classList.remove('active'); }
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        applyFilters();
      });
    });

    document.querySelectorAll('.filter-btn[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-sort]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        applyFilters();
      });
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchTerm = e.target.value.trim();
        applyFilters();
      }, 300);
    });

    loadAll();
  </script>

  <script src="/js/main.js"></script>
  <script src="/js/audio.js"></script>
</body>
</html>
