<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia — VOCES DEL TERROR</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
  <style>
    .share-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--text-muted);
      padding: 8px 20px;
      font-family: 'Special Elite', cursive;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .share-btn:hover {
      border-color: var(--blood-red);
      color: var(--crimson);
    }
    .like-btn {
      background: transparent;
      border: 1px solid #2a1a1a;
      color: var(--text-muted);
      padding: 10px 24px;
      font-family: 'Special Elite', cursive;
      font-size: 0.8rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .like-btn:hover, .like-btn.liked {
      border-color: var(--blood-red);
      color: var(--crimson);
      background: rgba(139,0,0,0.1);
      box-shadow: var(--glow-red);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Special Elite', cursive;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
      margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--crimson); }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo">💀</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <!-- Reading progress bar -->
  <div class="reading-progress" id="readingProgress"></div>

  <div class="particles-container" id="particles"></div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">✕</span>
    <img src="" alt="" id="lightboxImg">
  </div>

  <nav class="navbar">
    <a href="/" class="nav-logo">💀 <span>VOCES</span> DEL TERROR</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Inicio</a></li>
      <li><a href="/historias">Historias</a></li>
      <li><a href="/subir" class="btn-nav">+ Confesar</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div style="padding-top:70px;">
    <div class="story-detail" id="storyContent">
      <div class="empty-state" style="padding:8rem 2rem;">
        <span class="empty-state-icon">⏳</span>
        <h3>Cargando confesión...</h3>
      </div>
    </div>
  </div>

  <!-- RELATED STORIES -->
  <div style="background:#080000;border-top:1px solid var(--card-border);padding:5rem 2rem;">
    <div style="max-width:900px;margin:0 auto;">
      <div class="section-header">
        <span class="section-eyebrow">— Sigue Leyendo —</span>
        <h2 class="section-title">Más Confesiones</h2>
        <div class="section-divider"></div>
      </div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">💀</div>
    <p class="footer-tagline">Voces del Terror</p>
    <div class="footer-links">
      <a href="/">Inicio</a>
      <a href="/historias">Historias</a>
      <a href="/subir">Subir Historia</a>
    </div>
    <div class="footer-bottom">
      <p>⚠ Contenido perturbador para adultos.</p>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKCSSMZE3ybpyP1MSegm4nu1GUGQt9oNc",
      authDomain: "terror-6f51e.firebaseapp.com",
      projectId: "terror-6f51e",
      storageBucket: "terror-6f51e.firebasestorage.app",
      messagingSenderId: "127086938530",
      appId: "1:127086938530:web:bcd051bcf8766e9b214afb",
      measurementId: "G-K3J8MKZQ94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.__db = db;

    const storyId = window.location.pathname.split('/historia/')[1];

    async function loadStory() {
      try {
        const docRef = doc(db, 'historias', storyId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          document.getElementById('storyContent').innerHTML = `
            <div class="empty-state" style="padding:8rem 2rem;">
              <span class="empty-state-icon">💀</span>
              <h3>Historia no encontrada</h3>
              <p style="margin-top:1rem;"><a href="/historias" class="btn-primary">Ver todas las historias</a></p>
            </div>`;
          return;
        }

        const data = { id: docSnap.id, ...docSnap.data() };
        document.title = `${data.titulo} — VOCES DEL TERROR`;

        // Increment views
        try { await updateDoc(docRef, { views: increment(1) }); } catch(e) {}

        const dateStr = data.createdAt
          ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('es-ES', {weekday:'long',year:'numeric',month:'long',day:'numeric'})
          : 'Fecha desconocida';

        // Format story into paragraphs
        const paragraphs = (data.historia || '').split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');

        // Evidence gallery
        const galleryHtml = data.fotos && data.fotos.length ? `
          <div style="margin:3rem 0;">
            <h3 style="font-family:'Creepster',cursive;font-size:1.8rem;color:var(--crimson);text-shadow:var(--glow-red);margin-bottom:1.5rem;">📸 Evidencias (${data.fotos.length})</h3>
            <div class="evidence-gallery">
              ${data.fotos.map((url, i) => `
                <div class="evidence-item" onclick="openLightbox('${url}')">
                  <img src="${url}" alt="Evidencia ${i+1}" loading="lazy">
                </div>`).join('')}
            </div>
          </div>` : '';

        document.getElementById('storyContent').innerHTML = `
          <a href="/historias" class="back-link">← Volver a las Historias</a>

          <div class="story-header">
            <div style="font-family:'Special Elite',cursive;font-size:0.75rem;letter-spacing:3px;color:var(--blood-red);text-transform:uppercase;margin-bottom:1rem;">${data.categoria || 'Paranormal'}</div>
            <h1 class="story-title-detail">${data.titulo}</h1>
            <div class="story-meta-detail">
              <span>✍ ${data.autor || 'Anónimo'}</span>
              <span>📅 ${dateStr}</span>
              ${data.views ? `<span>👁 ${data.views} lecturas</span>` : ''}
              ${data.fotos && data.fotos.length ? `<span>📸 ${data.fotos.length} evidencias</span>` : ''}
            </div>
          </div>

          <!-- AUDIO PLAYER -->
          <div class="audio-section" id="mainAudioSection">
            <div class="audio-section-title">🎙 Narrador Oscuro — Escucha esta Confesión</div>
            <div class="audio-controls">
              <button type="button" class="audio-play-btn" id="mainPlayBtn" onclick="toggleMainAudio()">▶</button>
              <div class="audio-waveform" id="mainWaveform"></div>
              <div class="audio-info">
                <div class="audio-status" id="mainAudioStatus">LISTO PARA NARRAR</div>
                <div class="audio-duration" id="mainAudioDuration"></div>
              </div>
            </div>
            <select class="voice-select" id="mainVoiceSelect">
              <option value="">Voz automática</option>
            </select>
          </div>

          <!-- STORY BODY -->
          <div class="story-body" id="storyBody">
            ${paragraphs}
          </div>

          ${galleryHtml}

          <!-- ACTIONS -->
          <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;border-top:1px solid var(--card-border);padding-top:2rem;margin-top:2rem;">
            <button class="like-btn" id="likeBtn" onclick="toggleLike('${data.id}')">
              🩸 <span id="likeCount">${data.likes || 0}</span> Les perturbó
            </button>
            <button class="share-btn" onclick="shareStory('${data.titulo}')">📢 Compartir</button>
            <a href="/historias" class="share-btn">← Más Historias</a>
            <a href="/subir" class="btn-primary" style="margin-left:auto;">🩸 Contar la Tuya</a>
          </div>
        `;

        // Build waveform bars
        buildWaveform('mainWaveform', 50);

        // Load related stories
        loadRelated(data.categoria, data.id);

        // Store story data for audio
        window.__currentStory = data;

        // Init voices for this page
        setTimeout(() => {
          if (window.populateVoices) window.populateVoices('mainVoiceSelect');
        }, 500);

      } catch(e) {
        console.error(e);
        document.getElementById('storyContent').innerHTML = `
          <div class="empty-state" style="padding:8rem 2rem;">
            <span class="empty-state-icon">⚠️</span>
            <h3>Error al cargar la historia</h3>
            <p style="color:var(--text-muted);margin-top:0.5rem;">Configura las reglas de Firestore para permitir lectura.</p>
          </div>`;
      }
    }

    async function loadRelated(categoria, currentId) {
      try {
        const q = query(collection(db, 'historias'), orderBy('createdAt', 'desc'), limit(10));
        const snap = await getDocs(q);
        const stories = [];
        snap.forEach(d => { if (d.id !== currentId) stories.push({ id: d.id, ...d.data() }); });
        const related = stories.slice(0, 3);

        document.getElementById('relatedGrid').innerHTML = related.map(h => {
          const imgHtml = h.fotos && h.fotos.length
            ? `<img src="${h.fotos[0]}" alt="${h.titulo}" class="card-image" loading="lazy">`
            : `<div class="card-no-image">💀</div>`;
          return `
            <a href="/historia/${h.id}" class="story-card">
              ${imgHtml}
              <div class="card-content">
                <div class="card-category">${h.categoria || 'Paranormal'}</div>
                <h3 class="card-title">${h.titulo}</h3>
                <p class="card-excerpt">${(h.historia || '').substring(0, 100)}...</p>
              </div>
            </a>`;
        }).join('');
      } catch(e) {}
    }

    window.toggleLike = async function(id) {
      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      const liked = localStorage.getItem(`liked_${id}`);
      try {
        const docRef = doc(db, 'historias', id);
        if (liked) {
          await updateDoc(docRef, { likes: increment(-1) });
          localStorage.removeItem(`liked_${id}`);
          btn.classList.remove('liked');
          countEl.textContent = parseInt(countEl.textContent) - 1;
        } else {
          await updateDoc(docRef, { likes: increment(1) });
          localStorage.setItem(`liked_${id}`, '1');
          btn.classList.add('liked');
          countEl.textContent = parseInt(countEl.textContent) + 1;
        }
      } catch(e) {}
    };

    window.shareStory = function(titulo) {
      if (navigator.share) {
        navigator.share({ title: titulo, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
        if (window.showToast) window.showToast('🔗 Link copiado al portapapeles', 'success');
      }
    };

    window.openLightbox = function(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    };
    window.closeLightbox = function() {
      document.getElementById('lightbox').classList.remove('active');
    };

    window.toggleMainAudio = function() {
      if (!window.__currentStory) return;
      const text = window.__currentStory.titulo + '. ' + window.__currentStory.historia;
      const voiceSelect = document.getElementById('mainVoiceSelect');
      const voiceName = voiceSelect ? voiceSelect.value : '';
      if (window.toggleStoryAudio) {
        window.toggleStoryAudio('main', window.__currentStory.titulo, text, 'mainPlayBtn', 'mainWaveform', 'mainAudioStatus', voiceName);
      }
    };

    function buildWaveform(id, bars) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = Array.from({length: bars}, (_, i) => {
        const h = Math.random() * 40 + 10;
        return `<div class="wave-bar" style="height:${h}px;animation-delay:${(i * 0.05) % 0.5}s"></div>`;
      }).join('');
    }

    // Check liked status
    if (localStorage.getItem(`liked_${storyId}`)) {
      setTimeout(() => {
        const btn = document.getElementById('likeBtn');
        if (btn) btn.classList.add('liked');
      }, 1000);
    }

    loadStory();
  </script>

  <script src="/js/main.js"></script>
  <script src="/js/audio.js"></script>
</body>
</html>
